<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#7a3fd4"/>
      <stop offset="100%" stop-color="#4a1a96"/>
    </radialGradient>
    <radialGradient id="eye" cx="50%" cy="45%" r="50%">
      <stop offset="0%"  stop-color="#ff7080"/>
      <stop offset="40%" stop-color="#ff2040"/>
      <stop offset="100%" stop-color="#cc0020" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-eye" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-dot" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-head" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Antenna shaft -->
  <rect x="48.5" y="16" width="3" height="14" rx="1.5" fill="#9060e0"/>
  <!-- Antenna dot (red, glowing) -->
  <circle cx="50" cy="14" r="5" fill="#ff1a3a" filter="url(#glow-dot)"/>
  <circle cx="50" cy="14" r="2.5" fill="#ff6070"/>

  <!-- Head outer glow border -->
  <rect x="14" y="30" width="72" height="46" rx="16" fill="none" stroke="#9060e0" stroke-width="1.5" opacity="0.6" filter="url(#glow-head)"/>

  <!-- Head body -->
  <rect x="15" y="31" width="70" height="44" rx="15" fill="#221050"/>
  <!-- Inner face screen -->
  <rect x="20" y="36" width="60" height="34" rx="11" fill="#180a40"/>
  <!-- Head border -->
  <rect x="15" y="31" width="70" height="44" rx="15" fill="none" stroke="#8050d8" stroke-width="2"/>

  <!-- Side bolts -->
  <circle cx="15" cy="53" r="4" fill="#5a30b0"/>
  <circle cx="85" cy="53" r="4" fill="#5a30b0"/>
  <circle cx="15" cy="53" r="2" fill="#7040c8"/>
  <circle cx="85" cy="53" r="2" fill="#7040c8"/>

  <!-- Left eye -->
  <circle cx="37" cy="53" r="13" fill="url(#eye)" opacity="0.5"/>
  <circle cx="37" cy="53" r="8"  fill="#180a40"/>
  <circle cx="37" cy="53" r="6.5" fill="#ff2040" filter="url(#glow-eye)"/>
  <circle cx="37" cy="53" r="3.5" fill="#ff7080"/>

  <!-- Right eye -->
  <circle cx="63" cy="53" r="13" fill="url(#eye)" opacity="0.5"/>
  <circle cx="63" cy="53" r="8"  fill="#180a40"/>
  <circle cx="63" cy="53" r="6.5" fill="#ff2040" filter="url(#glow-eye)"/>
  <circle cx="63" cy="53" r="3.5" fill="#ff7080"/>
</svg>
