services:
  whisper:
    build: ./whisper
    container_name: whisper
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-small}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}
    ports:
      - '8100:8000'
    volumes:
      - ./whisper_cache:/root/.cache/huggingface
    networks:
      - hakaton
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  vlm:
    build: ./services/vlm
    container_name: vlm
    environment:
      - VLM_MODEL=${VLM_MODEL:-vikhyatk/moondream2}
      - VLM_REVISION=${VLM_REVISION:-2024-08-26}
    volumes:
      - vlm_models:/models
    networks:
      - hakaton
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  sd_api:
    build: ./services/sd_api
    container_name: sd_api
    environment:
      - SD_MODEL=${SD_MODEL:-runwayml/stable-diffusion-v1-5}
    volumes:
      - sd_models:/models
    networks:
      - hakaton
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  chromadb:
    image: chromadb/chroma:0.5.20
    container_name: chromadb
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/.chroma
      - ANONYMIZED_TELEMETRY=FALSE
    ports:
      - '8200:8000'
    volumes:
      - ./chroma_data:/chroma/.chroma
    networks:
      - hakaton
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.11.5
    container_name: qdrant
    ports:
      - '6333:6333'
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - hakaton
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:6333/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    container_name: backend
    ports:
      - '8000:8000'
    env_file: .env
    environment:
      - MWS_BASE_URL=https://api.gpt.mws.ru
      - MWS_API_KEY=${MWS_API_KEY:-sk-ewgiaPC3A6pPDYHwR8siVA}
      - MWS_LLM_MODEL=qwen2.5-72b-instruct
      - MWS_VLM_MODEL=qwen3-vl-30b-a3b-instruct
      - MWS_IMAGE_MODEL=qwen-image-lightning
      - MWS_EMBED_MODEL=bge-m3
      - MWS_ASR_MODEL=whisper-medium
      - USE_MWS_ASR=true
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - QDRANT_URL=http://qdrant:6333
      - WHISPER_URL=http://whisper:8000/transcribe
      - VLM_URL=http://vlm:8003
      - SD_URL=http://sd_api:8002
      - RAG_COLLECTION=rag_docs
      - MEM0_COLLECTION=mem0_main
    depends_on:
      chromadb:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      whisper:
        condition: service_started
    networks:
      - hakaton
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - '3000:8080'
    volumes:
      - ./open_webui_data:/app/backend/data
    environment:
      - OPENAI_API_BASE_URL=http://backend:8000/v1
      - OPENAI_API_KEY=gpthub
      - ENABLE_OPENAI_API=true
      - ENABLE_OLLAMA_API=false
      - OLLAMA_BASE_URL=
      - WEBUI_AUTH=${WEBUI_AUTH:-False}
      - WEBUI_NAME=GPTHub
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hakaton
    restart: unless-stopped

networks:
  hakaton:
    driver: bridge
    name: hakaton

volumes:
  vlm_models:
  sd_models:
  qdrant_data:
